# ─── Base de datos MySQL ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecomarket_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tu_password_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────────────────────────
# create-drop: crea las tablas al iniciar y las borra al cerrar (desarrollo)
# update: actualiza el esquema sin borrar datos (más seguro)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── Nombre de la aplicación ───────────────────────────────────────────────────
spring.application.name=ecomarket

# ─── Puerto del servidor ───────────────────────────────────────────────────────
server.port=8080
